name: momentum_macd_top5_weakscale
strategy_type: momentum_macd_top5
comment: 优化组D：弱市不完全暂停买入，改为限买2只、单票仓位降至10%；保留MA20卖出。

universe:
  codes: []

backtest:
  start: '2025-04-01'
  end: '2026-04-30'
  initial_cash: 1000000

filters:
  exclude_st: true
  exclude_bj: true
  min_listed_days: 0

buy:
  min_turnover_pct: 3.0
  trend_ma: ma20
  macd_golden_cross: true
  max_daily_buys: 5
  market_weak:
    up_ratio_lt: 0.45
    median_pct_lt: 0.0
    max_daily_buys: 2
    max_position_pct: 0.10

sell:
  below_ma: ma20

risk:
  max_position_pct: 0.20
  max_daily_buys: 5
  stop_loss_pct: 0.08
  take_profit_pct: 0.20
